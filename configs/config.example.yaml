# GRD SIEM Agent Configuration
# Copy this file to config.yaml and edit with your values.
#
# SETUP FLOW:
# 1. Register the agent from the GRD Dashboard (recommended) or via CLI
# 2. Set the agent_id and agent_token from registration
# 3. Set the platform URL and SIEM connection details
# 4. Run: grd-siem-agent validate --config config.yaml
# 5. Run: grd-siem-agent run --config config.yaml
#
# CLI REGISTRATION (alternative):
# 1. Set platform.url and platform.org_api_key
# 2. Run: grd-siem-agent register --config config.yaml
# 3. Copy the returned agent_id and agent_token into this file

agent:
  id: ""                                # From GRD Dashboard or 'grd-siem-agent register'
  name: "GRD SIEM Agent"                # Human-readable name
  hostname: ""                          # Auto-detected if empty

# Cloud platform connection
platform:
  url: "https://your-platform.example.com"   # GRD platform URL
  agent_token: ""                            # Token from dashboard or registration (or GRD_PLATFORM_AGENT_TOKEN)
  org_api_key: ""                            # Organization API key (only needed for CLI registration)

# SIEM connection
siem:
  type: "qradar"                                   # SIEM type: qradar, splunk, sentinel
  connection_id: ""                                # Platform connection UUID (from dashboard)
  api_url: "https://192.168.1.50"                  # QRadar console URL (internal network)
  credentials:
    api_key: "your-qradar-sec-token-here"          # QRadar SEC token (or GRD_SIEM_CREDENTIALS_API_KEY)
    validate_ssl: false                            # Set to true if QRadar has valid SSL cert
    api_version: "19.0"                            # QRadar API version (19.0=7.5.0 UP3, 26.0=latest)

# Sync settings
sync:
  interval_minutes: 15       # How often to poll for new offenses
  lookback_days: 7           # How far back to look on first run (no checkpoint)
  max_alerts_per_sync: 1000  # Maximum alerts per collection cycle
  filters:
    min_severity: "medium"   # Minimum severity: low, medium, high, critical, info

# Local buffer (for offline resilience)
buffer:
  enabled: true
  path: "/var/lib/grd-siem-agent/buffer.db"   # SQLite buffer file path (must be writable by grd-agent)
  max_size_mb: 500

# Logging
logging:
  level: "info"                                    # debug, info, warn, error
  path: "/var/log/grd-siem-agent/agent.log"        # Log file path (empty = stderr only)
  max_size_mb: 100

# Heartbeat
heartbeat:
  interval_seconds: 60       # How often to send heartbeat to platform

# Self-update (from GitHub Releases)
update:
  enabled: true                                    # Enable automatic updates
  check_interval_minutes: 10                       # How often to check for new versions (in minutes)
  # check_interval_hours: 6                        # Alternative: check interval in hours (minutes takes priority)
  github_repo: "KAPA-8/grd-siem-agent"             # GitHub repository for releases
  allow_prerelease: false                          # Whether to install pre-release versions
